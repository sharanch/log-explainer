name: Package

on:
  push:
    tags:
      - "v*.*.*"

jobs:

  # ── Linux: .deb + .rpm ──────────────────────────────────────────────────────
  build-linux:
    name: Build .deb and .rpm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install rpmbuild
        run: sudo apt-get install -y rpm

      - name: Build .deb
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          DEB_ROOT=pkg/deb/log-explainer_${VERSION}_all

          mkdir -p ${DEB_ROOT}/DEBIAN
          mkdir -p ${DEB_ROOT}/usr/bin
          mkdir -p ${DEB_ROOT}/usr/lib/log-explainer

          cp log_parser.py requirements.txt ${DEB_ROOT}/usr/lib/log-explainer/

          printf '#!/bin/bash\nexec python3 /usr/lib/log-explainer/log_parser.py "$@"\n' \
            > ${DEB_ROOT}/usr/bin/log-explainer
          chmod +x ${DEB_ROOT}/usr/bin/log-explainer

          cat > ${DEB_ROOT}/DEBIAN/control << EOF
          Package: log-explainer
          Version: ${VERSION}
          Architecture: all
          Maintainer: Sharan CH <me@sharanch.dev>
          Depends: python3 (>= 3.12), python3-pip
          Recommends: ollama
          Description: Plain-English log analysis for on-call engineers
           Tails a live log file and uses a local LLM (via Ollama) to explain
           each line in plain English in real time. Features severity
           classification, pattern spike detection, and incident summarization.
           .
           Ollama must be installed separately: https://ollama.com/download
          EOF

          printf '#!/bin/bash\nset -e\npip3 install requests --break-system-packages --quiet 2>/dev/null || pip3 install requests --quiet 2>/dev/null || true\nif ! command -v ollama &>/dev/null; then\n  echo "NOTE: Ollama not installed. See https://ollama.com/download"\nfi\n' \
            > ${DEB_ROOT}/DEBIAN/postinst
          chmod 755 ${DEB_ROOT}/DEBIAN/postinst

          dpkg-deb --build --root-owner-group ${DEB_ROOT}

      - name: Build .rpm
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          mkdir -p rpmbuild/BUILD rpmbuild/RPMS rpmbuild/SOURCES rpmbuild/SPECS rpmbuild/SRPMS
          mkdir -p /tmp/log-explainer-${VERSION}/usr/lib/log-explainer
          mkdir -p /tmp/log-explainer-${VERSION}/usr/bin

          cp log_parser.py requirements.txt \
            /tmp/log-explainer-${VERSION}/usr/lib/log-explainer/

          printf '#!/bin/bash\nexec python3 /usr/lib/log-explainer/log_parser.py "$@"\n' \
            > /tmp/log-explainer-${VERSION}/usr/bin/log-explainer
          chmod +x /tmp/log-explainer-${VERSION}/usr/bin/log-explainer

          cd /tmp && tar czf \
            $GITHUB_WORKSPACE/rpmbuild/SOURCES/log-explainer-${VERSION}.tar.gz \
            log-explainer-${VERSION}/

          cat > $GITHUB_WORKSPACE/rpmbuild/SPECS/log-explainer.spec << EOF
          Name:           log-explainer
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        Plain-English log analysis for on-call engineers
          License:        MIT
          URL:            https://github.com/${{ github.repository }}
          Source0:        %{name}-%{version}.tar.gz
          BuildArch:      noarch
          Requires:       python3 >= 3.12

          %description
          Tails a live log file and uses a local LLM (via Ollama) to explain each
          line in plain English in real time. No API keys needed.

          %prep
          %autosetup

          %install
          mkdir -p %{buildroot}/usr/lib/log-explainer
          mkdir -p %{buildroot}/usr/bin
          install -m 644 usr/lib/log-explainer/log_parser.py   %{buildroot}/usr/lib/log-explainer/
          install -m 644 usr/lib/log-explainer/requirements.txt %{buildroot}/usr/lib/log-explainer/
          install -m 755 usr/bin/log-explainer                  %{buildroot}/usr/bin/log-explainer

          %post
          pip3 install requests --quiet 2>/dev/null || true

          %files
          /usr/bin/log-explainer
          /usr/lib/log-explainer/log_parser.py
          /usr/lib/log-explainer/requirements.txt

          %changelog
          * $(date '+%a %b %d %Y') Sharan CH <me@sharanch.dev> - ${VERSION}-1
          - Release ${VERSION}
          EOF

          rpmbuild \
            --define "_topdir $GITHUB_WORKSPACE/rpmbuild" \
            -bb $GITHUB_WORKSPACE/rpmbuild/SPECS/log-explainer.spec

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            pkg/deb/log-explainer_${{ steps.version.outputs.VERSION }}_all.deb
            rpmbuild/RPMS/noarch/log-explainer-${{ steps.version.outputs.VERSION }}-1.noarch.rpm

  # ── macOS: .pkg ─────────────────────────────────────────────────────────────
  build-macos:
    name: Build .pkg
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build .pkg
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PAYLOAD=pkg/macos/payload

          mkdir -p ${PAYLOAD}/usr/local/lib/log-explainer
          mkdir -p ${PAYLOAD}/usr/local/bin
          mkdir -p pkg/macos/scripts

          cp log_parser.py requirements.txt ${PAYLOAD}/usr/local/lib/log-explainer/

          printf '#!/bin/bash\nexec python3 /usr/local/lib/log-explainer/log_parser.py "$@"\n' \
            > ${PAYLOAD}/usr/local/bin/log-explainer
          chmod +x ${PAYLOAD}/usr/local/bin/log-explainer

          printf '#!/bin/bash\nset -e\npip3 install requests --quiet 2>/dev/null || pip3 install requests --break-system-packages --quiet 2>/dev/null || true\nif ! command -v ollama &>/dev/null; then\n  echo "NOTE: Ollama not installed. See https://ollama.com/download"\nfi\n' \
            > pkg/macos/scripts/postinstall
          chmod +x pkg/macos/scripts/postinstall

          pkgbuild \
            --root ${PAYLOAD} \
            --identifier dev.sharanch.log-explainer \
            --version ${VERSION} \
            --scripts pkg/macos/scripts \
            --install-location / \
            pkg/macos/log-explainer-component.pkg

          productbuild \
            --package pkg/macos/log-explainer-component.pkg \
            pkg/macos/log-explainer-${VERSION}.pkg

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: pkg/macos/log-explainer-${{ steps.version.outputs.VERSION }}.pkg

  # ── Release: attach all packages ────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    permissions:
      contents: write

    steps:
      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release and upload packages
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Installation

            **Debian / Ubuntu**
            ```bash
            sudo dpkg -i log-explainer_${{ steps.version.outputs.VERSION }}_all.deb
            ```

            **RHEL / Fedora / CentOS**
            ```bash
            sudo rpm -i log-explainer-${{ steps.version.outputs.VERSION }}-1.noarch.rpm
            ```

            **macOS**
            Open `log-explainer-${{ steps.version.outputs.VERSION }}.pkg` and follow the installer.

            **After install**
            ```bash
            log-explainer /var/log/app.log --model qwen2.5-coder:1.5b

            ssh user@server "tail -f /var/log/app.log" | log-explainer /dev/stdin --model qwen2.5-coder:1.5b
            ```

            Ollama must be running locally. Pull a model first: `ollama pull qwen2.5-coder:1.5b`
          files: |
            dist/linux-packages/log-explainer_${{ steps.version.outputs.VERSION }}_all.deb
            dist/linux-packages/log-explainer-${{ steps.version.outputs.VERSION }}-1.noarch.rpm
            dist/macos-package/log-explainer-${{ steps.version.outputs.VERSION }}.pkg
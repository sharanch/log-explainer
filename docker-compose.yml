services:
  log-explainer:
    build: .
    image: ghcr.io/${GITHUB_REPOSITORY:-sharanch/log-explainer}:latest
    container_name: log-explainer
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434/api/chat
    volumes:
      - ${LOG_FILE_PATH:-./sample.log}:/logs/app.log:ro
    command: >
      /logs/app.log
      --model ${OLLAMA_MODEL:-qwen2.5-coder:1.5b}
      --context "${APP_CONTEXT:-Python application}"
      --severity ${MIN_SEVERITY:-INFO}
    restart: "no"